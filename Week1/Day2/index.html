<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">MyWebsite</div>
    <nav class="nav">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- MAIN SECTION -->
<section class="container">
    <div class="left">
    <div class="image-box">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="coding setup">

    </div>
</div>



    

    <div class="right">
        <div class="form-card">
            <h2>Contact Form</h2>
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button>Submit</button>
        </div>
    </div>

</section>

<!-- PRICING -->
<section class="pricing">
    <div class="card">
        <span class="badge">50% OFF</span>

        <h3>Premium Plan</h3>
        <div class="underline"></div>

        <h2 class="price">$19.99 <span>/month</span></h2>

        <p class="desc">
            Unlimited access to all features.
        </p>

        <button class="btn">Subscribe Now</button>
    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div>
        <h3>MyWebsite</h3>
    </div>

    <div>
        <h4>Quick Links</h4>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>

    <div>
        <h4>Newsletter</h4>
        <input type="email" placeholder="Enter email">
        <button>Subscribe</button>
    </div>
</footer>

</body>
</html>
