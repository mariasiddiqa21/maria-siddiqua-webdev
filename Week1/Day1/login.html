<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .link-text {
            text-align: center;
            margin-top: 15px;
        }

        .link-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .link-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Login</h2>

    <form>
        <label>Email:</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Password:</label>
        <input type="password" placeholder="Enter your password" minlength="8" required>

        <button type="submit">Login</button>
    </form>

    <p class="link-text">
        Don't have an account? <a href="signup.html">Signup</a>
    </p>

</div>
<script>
document.querySelector("form").addEventListener("submit", function(e) {
    let password = document.querySelector("input[type='password']").value;

    if (password.length < 8) {
        e.preventDefault();
        alert("Password must be at least 8 characters");
    }
});
</script>


</body>
</html>
