<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
    }

    /* LOGIN CARD */
    .auth-container {
      background: white;
      padding: 35px 30px;
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    /* INPUTS */
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #2563eb;
      outline: none;
      box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1e4ed8;
      transform: translateY(-1px);
    }

    /* TEXT */
    p {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
    }

    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="auth-container">
  <h2>Welcome Back </h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p>Don't have an account? <a href="signup.html">Signup</a></p>
</div>

<script src="app.js"></script>
</body>
</html>
